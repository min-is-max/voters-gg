<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messi vs Ronaldo Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">LEGENDS FACE OFF</p>
        <h1>메시 vs 호날두</h1>
      </header>

      <main class="battle-layout">
        <section class="player-panel player-panel-left">
          <div class="player-frame">
            <img src="./assets/messi.jpg" alt="리오넬 메시" />
          </div>
          <div class="player-meta">
            <p class="player-label">LEFT SIDE</p>
            <h2>MESSI</h2>
            <p class="player-tag">Argentina • Forward • Inter Miami</p>
          </div>
          <button class="vote-button vote-button-left" data-player="messi">메시에게 투표</button>
        </section>

        <section class="arena-panel">
          <div class="range-tabs" role="tablist" aria-label="집계 기준 선택">
            <button class="range-tab is-active" data-range="hour" type="button">시간별</button>
            <button class="range-tab" data-range="day" type="button">일별</button>
            <button class="range-tab" data-range="month" type="button">월별</button>
            <button class="range-tab" data-range="all" type="button">전체 득표수</button>
          </div>

          <div class="scoreboard">
            <div class="score-block score-block-left">
              <span class="score-name">Messi</span>
              <strong id="messi-count">0</strong>
              <span class="score-percent" id="messi-percent">50%</span>
            </div>
            <div class="score-block score-block-right">
              <span class="score-name">Ronaldo</span>
              <strong id="ronaldo-count">0</strong>
              <span class="score-percent" id="ronaldo-percent">50%</span>
            </div>
          </div>

          <div class="snapshot-grid">
            <article class="snapshot-card">
              <span class="snapshot-label">전체 투표수</span>
              <strong id="all-total-votes">0</strong>
              <span class="snapshot-meta" id="all-total-meta">Messi 0 · Ronaldo 0</span>
            </article>
            <article class="snapshot-card">
              <span class="snapshot-label">오늘 투표수</span>
              <strong id="today-total-votes">0</strong>
              <span class="snapshot-meta" id="today-total-meta">Messi 0 · Ronaldo 0</span>
            </article>
          </div>

          <div class="liquid-stage">
            <div class="droplet-layer" id="droplet-layer" aria-hidden="true"></div>
            <svg
              class="liquid-svg"
              viewBox="0 0 520 640"
              role="img"
              aria-label="메시와 호날두의 실시간 투표 비율 시각화"
            >
              <defs>
                <linearGradient id="messiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#4cc9ff" />
                  <stop offset="100%" stop-color="#125bce" />
                </linearGradient>
                <linearGradient id="ronaldoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#ff7a7a" />
                  <stop offset="100%" stop-color="#c1121f" />
                </linearGradient>
                <filter id="glassGlow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07111f" flood-opacity="0.45" />
                </filter>
              </defs>

              <rect class="arena-glass" x="30" y="28" width="460" height="584" rx="56" filter="url(#glassGlow)" />
              <clipPath id="liquidClip">
                <rect x="48" y="46" width="424" height="548" rx="42"></rect>
              </clipPath>

              <g clip-path="url(#liquidClip)">
                <rect id="messi-fill" x="48" y="46" width="212" height="548" fill="url(#messiGradient)"></rect>
                <rect id="ronaldo-fill" x="260" y="46" width="212" height="548" fill="url(#ronaldoGradient)"></rect>
                <path id="wave-boundary" class="wave-boundary" fill="rgba(255,255,255,0.18)"></path>
                <path id="wave-highlight" class="wave-highlight" fill="none"></path>
                <g id="bubble-layer"></g>
              </g>

              <rect class="arena-outline" x="30" y="28" width="460" height="584" rx="56"></rect>
            </svg>
            <div class="center-readout">
              <span id="center-label">시간별 비율</span>
              <strong id="center-ratio">50 : 50</strong>
            </div>
          </div>

          <div class="status-bar">
            <p class="live-status" id="live-status" data-mode="local">연결 준비 중...</p>
          </div>
        </section>

        <section class="player-panel player-panel-right">
          <div class="player-frame">
            <img src="./assets/ronaldo.jpg" alt="크리스티아누 호날두" />
          </div>
          <div class="player-meta">
            <p class="player-label">RIGHT SIDE</p>
            <h2>RONALDO</h2>
            <p class="player-tag">Portugal • Forward • Al Nassr</p>
          </div>
          <button class="vote-button vote-button-right" data-player="ronaldo">호날두에게 투표</button>
        </section>
      </main>
    </div>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
